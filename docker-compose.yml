services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - env/.env.production
    environment:
      - NODE_ENV=production
  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    shm_size: 128mb
    restart: always
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: behkhaan
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  node_modules:
  pgdata:
